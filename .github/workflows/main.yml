name: publish

on:
  workflow_dispatch:
    inputs:
      channel:
        description: "Канал: all | vc | vk | dzen | tg"
        default: "all"
      force_fill:
        description: "Сколько постов сгенерить принудительно (тест автодолива; 0 = обычная логика)"
        default: "0"
  schedule:
    # Несколько времён/сутки: free-крон GitHub задерживает и иногда дропает запуски,
    # поэтому страхуемся. Частота (1/день, запас 6ч) не даст задвоить — выстрелит
    # первый сработавший, остальные за день пропустятся. Время в UTC (МСК = +3).
    - cron: "23 5 * * *"   # 08:23 МСК
    - cron: "17 7 * * *"   # 10:17 МСК
    - cron: "41 9 * * *"   # 12:41 МСК
    - cron: "7 12 * * *"   # 15:07 МСК
    - cron: "0 13 * * *"   # 16:00 МСК — после суточного сброса квоты Scrapfly (12:29 UTC), чтобы dzen/ok-сверка успевала в тот же день

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Auto-fill content (держит план до конца следующего месяца)
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
          CF_TOKEN: ${{ secrets.CF_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CF_ACCOUNT }}
          GEN_FORCE: ${{ github.event.inputs.force_fill || '0' }}
        run: python scripts/gen_month.py || echo "автодолив пропущен (не критично)"

      - name: Validate (pytest)
        run: python -m pytest -q

      - name: Sync Dzen + OK publications (Scrapfly → календарь отражает реальность сам)
        env:
          SCRAPFLY_KEY: ${{ secrets.SCRAPFLY_KEY }}
        run: |
          python scripts/dzen_sync.py || echo "dzen_sync пропущен (не критично)"
          python scripts/ok_sync.py || echo "ok_sync пропущен (не критично)"

      - name: Publish
        env:
          VK_TOKEN: ${{ secrets.VK_TOKEN }}
          VK_OWNER_ID: ${{ secrets.VK_OWNER_ID }}
          VC_TOKEN: ${{ secrets.VC_TOKEN }}
          VC_SUBSITE_ID: ${{ secrets.VC_SUBSITE_ID }}
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL: ${{ secrets.TELEGRAM_CHANNEL }}
        run: python -m src.publish --channel "${{ github.event.inputs.channel || 'all' }}"

      - name: Commit state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A || true
          git commit -m "chore: update queue, covers and dzen feed [skip ci]" || echo "nothing to commit"
          git push || echo "nothing to push"
